name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Typecheck (app)
        run: npm run typecheck

      - name: Typecheck (domain)
        run: npm run typecheck --workspace @flashgate/domain

      - name: Lint
        run: npm run lint

      - name: Domain unit tests
        run: npm run test:domain
